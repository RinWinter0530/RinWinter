<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rin凛冬 - 冰与火之舞特效师</title>
    <style>
        :root {
            --ice: #00d4ff;
            --ice-glow: #7ec8f8;
            --ice-deep: #0098c7;
            --fire: #ff6b35;
            --fire-glow: #ff9a6c;
            --fire-deep: #c73e1a;
            --bg: #0a0a0f;
            --text: #e0e0e8;
            --text-dim: #8888a0;
            --glass-bg: rgba(16, 16, 24, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --radius-lg: 28px;
            --radius-md: 18px;
            --font-display: 'Georgia', 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
            --font-body: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            --transition-smooth: 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: #222 #0a0a0f;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a38;
            border-radius: 3px;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            perspective: 1200px;
            transition: transform 0.1s ease-out;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .click-ripple {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            pointer-events: none;
            z-index: 999;
            animation: rippleExpand 0.8s ease-out forwards;
        }
        @keyframes rippleExpand {
            0% {
                width: 0;
                height: 0;
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(0);
            }
            100% {
                width: 200vmax;
                height: 200vmax;
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .main-wrapper {
            position: relative;
            z-index: 1;
            transform-style: preserve-3d;
        }

        /* ============ NAV ============ */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: var(--transition-smooth);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            transform-style: preserve-3d;
        }
        .nav.scrolled {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(10, 10, 15, 0.7);
            box-shadow: 0 2px 30px rgba(0, 0, 0, 0.3);
            padding: 10px 32px;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: transform 0.3s ease;
        }
        .nav-logo svg {
            width: 42px;
            height: 42px;
            filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.5)) drop-shadow(0 0 8px rgba(255, 107, 53, 0.4));
            transition: filter 0.3s ease;
        }
        .nav-logo:hover svg {
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.8)) drop-shadow(0 0 15px rgba(255, 107, 53, 0.6));
            transform: scale(1.05);
        }
        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.88rem;
            letter-spacing: 0.04em;
            transition: var(--transition-smooth);
            position: relative;
            padding: 4px 0;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: linear-gradient(90deg, var(--ice), var(--fire-glow));
            transition: width 0.35s ease;
            border-radius: 1px;
        }
        .nav-links a:hover {
            color: #fff;
        }
        .nav-links a:hover::after {
            width: 100%;
        }
        .nav-cta {
            padding: 7px 18px;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(255, 107, 53, 0.12));
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff !important;
            font-weight: 500;
            transition: all 0.35s ease !important;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .nav-cta:hover {
            border-color: rgba(255, 255, 255, 0.35);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(255, 107, 53, 0.2));
            box-shadow: 0 0 30px rgba(0, 180, 220, 0.2), 0 0 20px rgba(255, 107, 53, 0.1);
        }
        .nav-cta::after {
            display: none !important;
        }

        .nav-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px;
            z-index: 101;
        }
        .nav-toggle span {
            width: 26px;
            height: 2px;
            background: #fff;
            border-radius: 2px;
            transition: var(--transition-smooth);
            display: block;
        }
        .nav-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .nav-toggle.active span:nth-child(2) {
            opacity: 0;
        }
        .nav-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ============ HERO SECTION ============ */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 100px 32px 60px;
            transform-style: preserve-3d;
        }
        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            max-width: 1100px;
            width: 100%;
            z-index: 2;
            align-items: center;
        }
        .hero-left {
            animation: fadeInUp 0.8s ease forwards;
        }
        .hero-right {
            animation: fadeInUp 0.8s 0.2s ease forwards;
            opacity: 0;
            animation-fill-mode: forwards;
        }
        .hero-badge {
            display: inline-block;
            padding: 5px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .hero-name {
            font-family: var(--font-display);
            font-size: clamp(2.6rem, 5.5vw, 4.5rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            line-height: 1.15;
            margin-bottom: 8px;
            background: linear-gradient(180deg, #e0f7ff 0%, var(--ice) 40%, var(--ice-deep) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 28px rgba(0, 212, 255, 0.5));
        }
        .hero-role {
            font-size: 1.05rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }
        .hero-desc {
            color: var(--text-dim);
            line-height: 1.8;
            font-size: 0.93rem;
            margin-bottom: 24px;
            max-width: 440px;
        }
        .hero-stats-mini {
            display: flex;
            gap: 28px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .hero-stat-mini {
            text-align: left;
        }
        .hero-stat-mini .num {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--ice), var(--fire-glow));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-stat-mini .lbl {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.04em;
        }
        .btn {
            padding: 13px 28px;
            border-radius: 50px;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: var(--transition-bounce);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--ice-deep), var(--ice));
            color: #fff;
            box-shadow: 0 8px 28px rgba(0, 180, 220, 0.35);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 38px rgba(0, 200, 240, 0.5);
        }

        /* 右侧联系卡片 */
        .contact-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 36px 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
            transform: translateZ(0);
            will-change: transform;
        }
        .contact-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 212, 255, 0.04), transparent, rgba(255, 107, 53, 0.04), transparent);
            animation: cardShine 12s linear infinite;
            pointer-events: none;
        }
        @keyframes cardShine {
            to {
                transform: rotate(360deg);
            }
        }
        .contact-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            transform: translateY(-3px) translateZ(10px);
        }
        .contact-card h3 {
            font-family: var(--font-display);
            font-size: 1.25rem;
            letter-spacing: 0.04em;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }
        .contact-card .contact-subtitle {
            font-size: 0.78rem;
            color: var(--text-dim);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            letter-spacing: 0.03em;
        }
        .contact-links-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            z-index: 1;
        }
        .contact-links-list li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-decoration: none;
            color: var(--text);
            transition: var(--transition-smooth);
            font-size: 0.88rem;
            letter-spacing: 0.03em;
        }
        .contact-links-list li a:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.18);
            transform: translateX(4px) translateZ(5px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .contact-icon-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .contact-icon-dot.bili {
            background: rgba(251, 114, 153, 0.2);
            color: #fb7299;
        }
        .contact-icon-dot.yt {
            background: rgba(255, 60, 60, 0.18);
            color: #ff5555;
        }
        .contact-icon-dot.qq {
            background: rgba(18, 183, 245, 0.2);
            color: #12b7f5;
        }
        .contact-link-arrow {
            margin-left: auto;
            color: var(--text-dim);
            font-size: 0.75rem;
            transition: var(--transition-smooth);
        }
        .contact-links-list li a:hover .contact-link-arrow {
            color: #fff;
            transform: translateX(3px);
        }

        /* Orbit背景 3D增强 */
        .orbit-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(0deg) rotateY(0deg);
            pointer-events: none;
            z-index: 0;
            width: min(70vw, 70vh, 580px);
            height: min(70vw, 70vh, 580px);
            opacity: 0.45;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }
        .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.05);
            transform: translate(-50%, -50%);
            animation: orbitPulse 4s ease-in-out infinite;
        }
        .orbit-ring:nth-child(1) {
            width: 100%;
            height: 100%;
        }
        .orbit-ring:nth-child(2) {
            width: 78%;
            height: 78%;
            animation-delay: 0.8s;
        }
        .orbit-ring:nth-child(3) {
            width: 56%;
            height: 56%;
            animation-delay: 1.6s;
            border-style: dashed;
            border-width: 1px;
        }
        .orbit-ring:nth-child(4) {
            width: 34%;
            height: 34%;
            animation-delay: 2.4s;
            border-width: 2px;
        }
        @keyframes orbitPulse {
            0%,
            100% {
                border-color: rgba(255, 255, 255, 0.04);
            }
            50% {
                border-color: rgba(255, 255, 255, 0.1);
            }
        }
        .orbit-ball {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }
        .orbit-ball-ice {
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at 35% 35%, #fff, var(--ice) 50%, var(--ice-deep) 100%);
            box-shadow: 0 0 35px rgba(0, 200, 240, 0.8), 0 0 70px rgba(0, 180, 220, 0.4);
            animation: orbitRotate1 8s linear infinite;
            top: calc(50% - 9px);
            left: calc(50% - 9px);
        }
        .orbit-ball-fire {
            width: 14px;
            height: 14px;
            background: radial-gradient(circle at 35% 35%, #fff, var(--fire-glow) 40%, var(--fire) 100%);
            box-shadow: 0 0 30px rgba(255, 120, 50, 0.8), 0 0 60px rgba(255, 90, 40, 0.4);
            animation: orbitRotate2 11s linear infinite;
            top: calc(50% - 7px);
            left: calc(50% - 7px);
        }
        @keyframes orbitRotate1 {
            from {
                transform: rotate(0deg) translateX(calc(min(35vw, 35vh, 290px))) rotate(0deg);
            }
            to {
                transform: rotate(360deg) translateX(calc(min(35vw, 35vh, 290px))) rotate(-360deg);
            }
        }
        @keyframes orbitRotate2 {
            from {
                transform: rotate(180deg) translateX(calc(min(27vw, 27vh, 225px))) rotate(-180deg);
            }
            to {
                transform: rotate(540deg) translateX(calc(min(27vw, 27vh, 225px))) rotate(-540deg);
            }
        }
        .orbit-center-diamond {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 24px;
            height: 24px;
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            animation: diamondGlow 3s ease-in-out infinite;
        }
        @keyframes diamondGlow {
            0%,
            100% {
                border-color: rgba(255, 255, 255, 0.12);
                box-shadow: 0 0 8px rgba(255, 255, 255, 0.04);
            }
            50% {
                border-color: rgba(255, 255, 255, 0.35);
                box-shadow: 0 0 24px rgba(200, 220, 255, 0.18);
            }
        }

        /* ============ WORKS SECTION ============ */
        .section {
            padding: 80px 32px;
            position: relative;
            z-index: 2;
            transform-style: preserve-3d;
        }
        .section-inner {
            max-width: 1100px;
            margin: 0 auto;
        }
        .section-label {
            display: inline-block;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 10px;
            padding: 4px 14px;
            border-radius: 50px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .section-title {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            letter-spacing: 0.03em;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .section-desc {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 40px;
            line-height: 1.7;
        }
        .works-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }
        .work-video-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: var(--transition-smooth);
            position: relative;
            transform: translateZ(0);
            will-change: transform;
        }
        .work-video-card:hover {
            border-color: rgba(255, 255, 255, 0.22);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            transform: translateY(-4px) translateZ(10px);
        }
        .work-video-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--ice), var(--fire-glow));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 2;
            pointer-events: none;
        }
        .work-video-card:hover::after {
            opacity: 1;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        .video-fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d16;
            color: var(--text-dim);
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            z-index: 0;
            text-align: center;
        }
        .work-video-info {
            padding: 22px 26px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 12px;
            justify-content: space-between;
        }
        .work-video-info .info-left h3 {
            font-family: var(--font-display);
            font-size: 1.15rem;
            letter-spacing: 0.03em;
            margin-bottom: 4px;
            color: #fff;
        }
        .work-video-info .info-left .meta {
            font-size: 0.78rem;
            color: var(--text-dim);
            letter-spacing: 0.03em;
        }
        .work-video-info .info-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .work-tag {
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-dim);
            letter-spacing: 0.03em;
            white-space: nowrap;
        }
        .work-bv-link {
            font-size: 0.72rem;
            color: var(--ice);
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: var(--transition-smooth);
            padding: 5px 14px;
            border-radius: 50px;
            border: 1px solid rgba(0, 212, 255, 0.25);
            white-space: nowrap;
        }
        .work-bv-link:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.5);
            color: #fff;
            transform: scale(1.05);
        }

        /* ============ FOOTER ============ */
        .footer {
            text-align: center;
            padding: 36px 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            position: relative;
            z-index: 2;
        }

        /* ============ ANIMATIONS ============ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .reveal {
            opacity: 0;
            transform: translateY(40px) translateZ(-20px);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0) translateZ(0);
        }
        .reveal-delay-1 {
            transition-delay: 0.1s;
        }
        .reveal-delay-2 {
            transition-delay: 0.2s;
        }
        .reveal-delay-3 {
            transition-delay: 0.3s;
        }

        .floating-geo {
            position: absolute;
            pointer-events: none;
            opacity: 0.05;
            z-index: 0;
            animation: floatGeo 20s ease-in-out infinite;
        }
        .floating-geo.triangle {
            width: 0;
            height: 0;
            border-left: 26px solid transparent;
            border-right: 26px solid transparent;
            border-bottom: 46px solid var(--ice);
        }
        .floating-geo.square {
            width: 34px;
            height: 34px;
            border: 2px solid var(--fire-glow);
            transform: rotate(45deg);
        }
        @keyframes floatGeo {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-35px) rotate(90deg);
            }
            50% {
                transform: translateY(-10px) rotate(180deg);
            }
            75% {
