    <script>
        (function() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const PARTICLE_COUNT = 100;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                initParticles();
            });

            class Particle {
                constructor() {
                    this.reset();
                    this.y = Math.random() * canvas.height;
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = -10;
                    this.size = Math.random() * 2 + 0.4;
                    this.speedY = Math.random() * 0.45 + 0.18;
                    this.speedX = (Math.random() - 0.5) * 0.35;
                    this.opacity = Math.random() * 0.65 + 0.2;
                    this.twinkleSpeed = Math.random() * 0.018 + 0.005;
                    this.twinkleOffset = Math.random() * Math.PI * 2;
                    const colorRand = Math.random();
                    if (colorRand < 0.4) {
                        this.hue = 195 + Math.random() * 20;
                        this.saturation = 80 + Math.random() * 20;
                    } else if (colorRand < 0.7) {
                        this.hue = 20 + Math.random() * 15;
                        this.saturation = 85 + Math.random() * 15;
                    } else {
                        this.hue = 0;
                        this.saturation = 0;
                    }
                    this.lightness = 55 + Math.random() * 40;
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    this.opacity += Math.sin(Date.now() * this.twinkleSpeed + this.twinkleOffset) * 0.007;
                    this.opacity = Math.max(0.08, Math.min(0.85, this.opacity));
                    if (this.y > canvas.height + 10 || this.x < -20 || this.x > canvas.width + 20) {
                        this.reset();
                        this.y = -10;
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    const color = this.saturation === 0 ?
                        `rgba(255,255,255,${this.opacity * 0.65})` :
                        `hsla(${this.hue},${this.saturation}%,${this.lightness}%,${this.opacity})`;
                    ctx.fillStyle = color;
                    ctx.fill();
                    if (this.size > 1 && this.opacity > 0.35) {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * 2.2, 0, Math.PI * 2);
                        const glowColor = this.saturation === 0 ?
                            `rgba(255,255,255,${this.opacity * 0.1})` :
                            `hsla(${this.hue},${this.saturation}%,${this.lightness}%,${this.opacity * 0.12})`;
                        ctx.fillStyle = glowColor;
                        ctx.fill();
                    }
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push(new Particle());
                }
            }
            initParticles();

            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                }
            });

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    const dx = p.x - mouseX;
                    const dy = p.y - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 160) {
                        const force = (160 - dist) / 160;
                        p.x += (dx / dist) * force * 0.5;
                        p.y += (dy / dist) * force * 0.5;
                    }
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            const orbitContainer = document.getElementById('orbitContainer');
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 20;
                const y = (e.clientY / window.innerHeight - 0.5) * 15;
                if (orbitContainer) {
                    orbitContainer.style.transform = `translate(-50%, -50%) rotateX(${-y}deg) rotateY(${x}deg)`;
                }
            });
            document.addEventListener('mouseleave', () => {
                if (orbitContainer) {
                    orbitContainer.style.transform = 'translate(-50%, -50%) rotateX(0deg) rotateY(0deg)';
                }
            });

            const nav = document.getElementById('nav');
            const navToggle = document.getElementById('navToggle');
            const navLinks = document.getElementById('navLinks');

            window.addEventListener('scroll', () => {
                if (window.scrollY > 60) {
                    nav.classList.add('scrolled');
                } else {
                    nav.classList.remove('scrolled');
                }
            });

            navToggle.addEventListener('click', () => {
                navToggle.classList.toggle('active');
                navLinks.classList.toggle('open');
            });

            document.querySelectorAll('.nav-link, a[href^="#"]').forEach(link => {
                link.addEventListener('click', function(e) {
                    const href = this.getAttribute('href');
                    if (!href || href === '#') return;
                    if (href.startsWith('#')) {
                        e.preventDefault();
                        const target = document.querySelector(href);
                        if (!target) return;

                        const ripple = document.createElement('div');
                        ripple.className = 'click-ripple';
                        const rect = this.getBoundingClientRect();
                        const x = rect.left + rect.width / 2;
                        const y = rect.top + rect.height / 2;
                        ripple.style.left = x + 'px';
                        ripple.style.top = y + 'px';
                        document.body.appendChild(ripple);
                        ripple.addEventListener('animationend', () => ripple.remove());

                        setTimeout(() => {
                            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }, 150);
                    }
                });
            });

            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    navToggle.classList.remove('active');
                    navLinks.classList.remove('open');
                });
            });

            const revealElements = document.querySelectorAll('.reveal');
            const observerOptions = {
                root: null,
                rootMargin: '0px 0px -40px 0px',
                threshold: 0.12,
            };
            const revealObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        revealObserver.unobserve(entry.target);
                    }
                });
            }, observerOptions);
            revealElements.forEach(el => revealObserver.observe(el));

            console.log('❄️🔥 Rin凛冬 · 冰与火之舞特效师');
            console.log('轨道上的冰与火，永远在旋转。');
        })();
    </script>
